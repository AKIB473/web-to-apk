<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>My App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { opacity: 0.85; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: block;
      background: white;
      color: #764ba2;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      width: 100%;
      margin-bottom: 0.75rem;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .badge {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚀</div>
    <h1>My First App</h1>
    <p>This is your web app running as a native Android application. Replace the files in <code>www/</code> with your own HTML, CSS and JavaScript.</p>
    <button class="btn" onclick="alert('Hello from your Android app!')">Tap Me!</button>
    <button class="btn" onclick="showInfo()">App Info</button>
    <div class="badge">Built with WebToAPK · github.com/AKIB473/web-to-apk</div>
  </div>

  <script>
    function showInfo() {
      const ua = navigator.userAgent;
      const info = [
        'Platform: ' + navigator.platform,
        'Language: ' + navigator.language,
        'Screen: ' + screen.width + 'x' + screen.height,
        'Online: ' + navigator.onLine,
      ].join('\n');
      alert('Device Info:\n\n' + info);
    }
  </script>
</body>
</html>

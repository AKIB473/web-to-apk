name: Setup Keystore (Run Once for Play Store)

# ══════════════════════════════════════════════════════════════════════════════
#
#  Run this workflow ONE TIME if you want to publish on Google Play Store.
#  It generates a permanent signing key and saves it as GitHub Secrets
#  automatically — no manual copy-paste needed.
#
#  After running:
#    - Your next build will use a real permanent signed keystore
#    - The APK/AAB will be accepted by Google Play
#    - You can update your app on Play Store forever with this same key
#
#  For casual use (sideloading APK), you do NOT need to run this.
#  The main build workflow already produces a working signed APK.
#
# ══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Your app name (e.g. My Cool App)"
        required: true
        default: "My App"
      key_alias:
        description: "Key alias — any short name (e.g. myapp)"
        required: true
        default: "release"
      store_password:
        description: "Keystore password — min 6 chars (SAVE THIS SOMEWHERE SAFE)"
        required: true
      key_password:
        description: "Key password — can be same as store password"
        required: true

permissions:
  contents: write

jobs:
  setup:
    name: Generate and Save Keystore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate permanent keystore
        run: |
          keytool -genkeypair \
            -keystore release.jks \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 9125 \
            -storepass "${{ inputs.store_password }}" \
            -keypass  "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.app_name }}, OU=App, O=${{ inputs.app_name }}, L=-, ST=-, C=US" \
            -storetype JKS -noprompt

          echo "Keystore created: $(wc -c < release.jks) bytes"

          keytool -list \
            -keystore release.jks \
            -storepass "${{ inputs.store_password }}" \
            -noprompt

      - name: Save secrets to GitHub repository
        run: python3 ci/save_secrets.py
        env:
          GH_TOKEN:               ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:                ${{ github.repository }}
          STORE_PASSWORD:         ${{ inputs.store_password }}
          KEY_ALIAS:              ${{ inputs.key_alias }}
          KEY_PASSWORD:           ${{ inputs.key_password }}

      - name: Upload keystore backup
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup-KEEP-SAFE
          path: release.jks
          retention-days: 1

      - name: Done
        run: |
          echo "## Keystore Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your signing secrets have been saved to this repository automatically." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the **keystore-backup-KEEP-SAFE** artifact (expires in 24h)" >> $GITHUB_STEP_SUMMARY
          echo "2. Store the \`release.jks\` file somewhere safe (password manager, USB drive)" >> $GITHUB_STEP_SUMMARY
          echo "3. Push any change to \`main\` — your next build will be Play Store ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> The keystore backup expires in 24 hours — save it now!" >> $GITHUB_STEP_SUMMARY

name: Build Android APK

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS (add these in Settings > Secrets > Actions):
#   KEYSTORE_BASE64          - base64 encoded .jks keystore file
#   SIGNING_STORE_PASSWORD   - keystore password
#   SIGNING_KEY_ALIAS        - key alias inside the keystore
#   SIGNING_KEY_PASSWORD     - key password
#
# Run the "Generate Keystore" workflow first if you don't have these yet.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: release
        type: choice
        options: [release, debug]

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  # ── Job 2: Build Web ────────────────────────────────────────────────────────
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Verify www folder
        run: |
          ls -la www/
          test -f www/index.html && echo "www/index.html OK" || exit 1

      - name: Upload www
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: www/
          retention-days: 1

  # ── Job 3: Build Android ────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-web
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check signing secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.KEYSTORE_BASE64 }}"          ] && MISSING="$MISSING KEYSTORE_BASE64"
          [ -z "${{ secrets.SIGNING_STORE_PASSWORD }}"   ] && MISSING="$MISSING SIGNING_STORE_PASSWORD"
          [ -z "${{ secrets.SIGNING_KEY_ALIAS }}"        ] && MISSING="$MISSING SIGNING_KEY_ALIAS"
          [ -z "${{ secrets.SIGNING_KEY_PASSWORD }}"     ] && MISSING="$MISSING SIGNING_KEY_PASSWORD"

          if [ -n "$MISSING" ]; then
            echo ""
            echo "ERROR: Missing required GitHub Secrets:$MISSING"
            echo ""
            echo "To fix this:"
            echo "  1. Go to: your repo > Settings > Secrets and variables > Actions"
            echo "  2. Run the 'Generate Keystore' workflow to create your keystore"
            echo "  3. Follow the instructions in the downloaded artifact"
            echo "  4. Add all 4 secrets, then re-run this workflow"
            echo ""
            exit 1
          fi
          echo "All signing secrets present"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Download www
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: www/

      - name: Detect version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
          fi
          CODE=$(git rev-list --count HEAD 2>/dev/null || echo "1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE"       >> $GITHUB_OUTPUT
          echo "Version: $VERSION (code: $CODE)"

      - name: Add Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set version in build.gradle
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.version.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ steps.version.outputs.version }}\"/" android/app/build.gradle
          echo "Version set: code=${{ steps.version.outputs.code }} name=${{ steps.version.outputs.version }}"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          BYTES=$(wc -c < android/app/release.keystore)
          echo "Keystore written: $BYTES bytes"
          if [ "$BYTES" -lt 100 ]; then
            echo "ERROR: Keystore file is too small ($BYTES bytes). KEYSTORE_BASE64 secret may be invalid."
            exit 1
          fi

      - name: Verify keystore
        run: |
          keytool -list \
            -keystore android/app/release.keystore \
            -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
            -noprompt 2>&1 | head -10
          echo "Keystore verified"
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Write signing config to build.gradle
        run: python3 setup_keystore.py android/app/build.gradle
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Build Release APK
        if: inputs.build_type != 'debug'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Build Release AAB
        if: inputs.build_type != 'debug'
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon 2>&1 | tail -20
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        run: cd android && ./gradlew assembleDebug --no-daemon 2>&1 | tail -20

      - name: List all output files
        run: |
          echo "APK/AAB files:"
          find android/app/build/outputs -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Rename outputs
        run: |
          V="${{ steps.version.outputs.version }}"
          D=$(date +%Y%m%d)
          APK="android/app/build/outputs/apk/release/app-release.apk"
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          [ -f "$APK" ] && mv "$APK" "android/app/build/outputs/apk/release/WebToAPK-v${V}-${D}.apk" && echo "APK renamed"
          [ -f "$AAB" ] && mv "$AAB" "android/app/build/outputs/bundle/release/WebToAPK-v${V}-${D}.aab" && echo "AAB renamed"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: AAB-v${{ needs.build-android.outputs.version || steps.version.outputs.version }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/build/reports/
          retention-days: 7

      - name: Build summary
        if: always()
        run: |
          echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Code | ${{ steps.version.outputs.code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" 2>/dev/null | head -1)
          [ -n "$APK" ] && echo "| APK | $(basename $APK) |" >> $GITHUB_STEP_SUMMARY
          [ -n "$AAB" ] && echo "| AAB | $(basename $AAB) |" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: GitHub Release ───────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: APK-v${{ needs.build-android.outputs.version }}
          path: release-files/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: AAB-v${{ needs.build-android.outputs.version }}
          path: release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WebToAPK v${{ needs.build-android.outputs.version }}
          body: |
            ## WebToAPK v${{ needs.build-android.outputs.version }}

            ### Downloads
            | File | Use |
            |------|-----|
            | `.apk` | Install directly on Android 7.0+ |
            | `.aab` | Upload to Google Play Store |

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Install APK
            1. Transfer APK to your Android device
            2. Enable "Install from unknown sources" in Settings
            3. Open the APK file and install
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

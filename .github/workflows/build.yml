name: 🚀 TitanChart — Build, Test & Release

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options: [release, debug, both]
      version_override:
        description: "Version override (e.g. 2.1.0). Leave blank to auto-detect."
        required: false
        default: ""
      notify:
        description: "Send Telegram notification?"
        required: true
        default: "true"
        type: boolean

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  APP_NAME: "TitanChart"

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── JOB 1: Lint + Unit Tests ────────────────────────────────────────────────
  lint-and-test:
    name: 🔍 Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔎 ESLint
        run: npm run lint --if-present

      - name: 🧪 Unit tests with coverage
        run: npm run test -- --coverage
        env:
          VITE_BOT_TOKEN: "test_token_ci"
          VITE_CHAT_ID:   "000000000"

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: 📋 Test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              ['lines','statements','functions','branches'].forEach(k =>
                console.log(\`| \${k} | \${s[k].pct}% |\`)
              );
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

  # ── JOB 2: Web Build ────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web App
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🏗️ Build web app (Vite)
        run: npm run build
        env:
          # Bot token & chat ID are injected at build time from secrets
          # They become compile-time constants — NOT exposed in any API call on server
          VITE_BOT_TOKEN: ${{ secrets.VITE_BOT_TOKEN }}
          VITE_CHAT_ID:   ${{ secrets.VITE_CHAT_ID }}

      - name: 🔍 Verify dist output
        run: |
          echo "📁 Built files:"
          ls -lah dist/
          [ -f dist/index.html ] && echo "✅ index.html exists" || (echo "❌ index.html missing" && exit 1)

      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ── JOB 3: Android Build ────────────────────────────────────────────────────
  build-android:
    name: 🤖 Android Build (${{ inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    needs: build-web

    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version_override }}" ]]; then
            V="${{ inputs.version_override }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          elif [[ -f "package.json" ]]; then
            V=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
          else
            V="1.0.0"
          fi
          CODE=$(git rev-list --count HEAD 2>/dev/null || echo "1")
          echo "version_name=${V}"    >> $GITHUB_OUTPUT
          echo "version_code=${CODE}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${V} (code: ${CODE})"

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 📥 Download built web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: 📱 Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "ℹ️ android/ already exists"
          fi

      - name: 🔄 Capacitor sync
        run: npx cap sync android

      - name: 📋 Inject Android permissions
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          inject() {
            grep -q "$1" "$M" || sed -i "/<manifest/a\\    <uses-permission android:name=\"$1\" />" "$M"
          }
          inject "android.permission.INTERNET"
          inject "android.permission.ACCESS_NETWORK_STATE"
          inject "android.permission.WAKE_LOCK"
          inject "android.permission.VIBRATE"
          echo "✅ Permissions:"
          grep "uses-permission" "$M"

      - name: 🔢 Set version in build.gradle
        run: |
          V="${{ steps.version.outputs.version_name }}"
          C="${{ steps.version.outputs.version_code }}"
          sed -i "s/versionCode .*/versionCode ${C}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${V}\"/" android/app/build.gradle
          echo "✅ versionCode=${C}, versionName=${V}"

      - name: 🔑 Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          keytool -list \
            -keystore android/app/release.keystore \
            -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -noprompt 2>/dev/null && echo "✅ Keystore verified" || {
              echo "❌ Keystore invalid — check KEYSTORE_BASE64 secret"
              exit 1
            }

      - name: ⚙️ Configure signing
        run: |
          G="android/app/build.gradle"
          grep -q "signingConfigs" "$G" || cat >> "$G" << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile     file("release.keystore")
                      storePassword System.getenv("SIGNING_STORE_PASSWORD")
                      keyAlias      System.getenv("SIGNING_KEY_ALIAS")
                      keyPassword   System.getenv("SIGNING_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled     true
                      shrinkResources   true
                      proguardFiles     getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
                      signingConfig     signingConfigs.release
                  }
                  debug {
                      applicationIdSuffix ".debug"
                      versionNameSuffix   "-debug"
                      debuggable          true
                  }
              }
          }
          EOF
          echo "✅ Signing configured"

      - name: 🔨 Build Release APK + AAB
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cd android && chmod +x gradlew
          echo "▶ assembleRelease..."
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -40
          echo "▶ bundleRelease (AAB)..."
          ./gradlew bundleRelease  --no-daemon               2>&1 | tail -20

      - name: 🔨 Build Debug APK
        if: inputs.build_type == 'debug' || inputs.build_type == 'both'
        run: |
          cd android && ./gradlew assembleDebug --no-daemon 2>&1 | tail -20

      - name: 📝 Rename artifacts
        run: |
          V="${{ steps.version.outputs.version_name }}"
          D=$(date +%Y%m%d)
          APK="android/app/build/outputs/apk/release/app-release.apk"
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          [ -f "$APK" ] && mv "$APK" "android/app/build/outputs/apk/release/TitanChart-v${V}-${D}.apk"
          [ -f "$AAB" ] && mv "$AAB" "android/app/build/outputs/bundle/release/TitanChart-v${V}-${D}.aab"
          echo "📦 Artifacts:"
          find android/app/build/outputs -name "*.apk" -o -name "*.aab"

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TitanChart-APK-v${{ steps.version.outputs.version_name }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: TitanChart-AAB-v${{ steps.version.outputs.version_name }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/build/reports/
          retention-days: 7

  # ── JOB 4: GitHub Release (on tag) ─────────────────────────────────────────
  create-release:
    name: 🎉 GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-android.result == 'success'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: TitanChart-APK-v${{ needs.build-android.outputs.version_name }}
          path: ./release-files/

      - name: 📥 Download AAB
        uses: actions/download-artifact@v4
        with:
          name: TitanChart-AAB-v${{ needs.build-android.outputs.version_name }}
          path: ./release-files/

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TitanChart v${{ needs.build-android.outputs.version_name }}"
          body: |
            ## 📱 TitanChart v${{ needs.build-android.outputs.version_name }}

            ### 📥 Downloads
            | File | Use |
            |------|-----|
            | `.apk` | Install directly on Android |
            | `.aab` | Upload to Google Play Store |

            ### 📋 Changes
            ${{ github.event.head_commit.message }}

            ### 📱 Requirements
            - Android 7.0+ (API 24)
          draft: false
          prerelease: ${{ contains(needs.build-android.outputs.version_name, 'beta') || contains(needs.build-android.outputs.version_name, 'alpha') }}
          files: ./release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── JOB 5: Notify ───────────────────────────────────────────────────────────
  notify:
    name: 📣 Telegram Notify
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-web, build-android]
    if: always()

    steps:
      - name: 📣 Send notification
        if: secrets.TELEGRAM_BOT_TOKEN != ''
        run: |
          STATUS="${{ needs.build-android.result }}"
          TESTS="${{ needs.lint-and-test.result }}"
          VERSION="${{ needs.build-android.outputs.version_name }}"
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$STATUS" == "success" ]]; then
            ICON="✅"; TEXT="Build Successful"
          elif [[ "$STATUS" == "skipped" ]]; then
            ICON="⏭️"; TEXT="Build Skipped"
          else
            ICON="❌"; TEXT="Build Failed"
          fi

          MSG="${ICON} *TitanChart — ${TEXT}*
          📦 Version: \`v${VERSION}\`
          🧪 Tests: \`${TESTS}\`
          🌿 Branch: \`${{ github.ref_name }}\`
          👤 By: ${{ github.actor }}
          🔗 [View Build](${URL})"

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" > /dev/null

      - name: 📊 Pipeline summary
        run: |
          echo "## 🚀 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint & Tests | ${{ needs.lint-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web Build    | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Android      | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`v${{ needs.build-android.outputs.version_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }} on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

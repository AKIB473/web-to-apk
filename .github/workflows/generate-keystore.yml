name: Generate Keystore (Run Once)

# ─────────────────────────────────────────────────────────────────────────────
# Run this workflow ONCE to generate your signing keystore.
# After running, download the artifact and follow the instructions inside.
# You only need to do this ONE TIME ever.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App name (e.g. MyApp)"
        required: true
        default: "WebToAPK"
      key_alias:
        description: "Key alias (e.g. myapp-key)"
        required: true
        default: "release-key"
      store_password:
        description: "Keystore password (min 6 chars — SAVE THIS!)"
        required: true
      key_password:
        description: "Key password (can be same as store password)"
        required: true
      validity_years:
        description: "Validity in years"
        required: true
        default: "25"
        type: choice
        options: ["10", "25", "50"]

jobs:
  generate:
    name: Generate Signing Keystore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore
        run: |
          VALIDITY_DAYS=$(( ${{ inputs.validity_years }} * 365 ))

          keytool -genkeypair \
            -keystore release.jks \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $VALIDITY_DAYS \
            -storepass "${{ inputs.store_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.app_name }}, OU=Mobile, O=${{ inputs.app_name }}, L=City, ST=State, C=US" \
            -storetype JKS \
            -noprompt

          echo "Keystore size: $(wc -c < release.jks) bytes"

      - name: Verify keystore
        run: |
          keytool -list \
            -keystore release.jks \
            -storepass "${{ inputs.store_password }}" \
            -noprompt
          echo "Keystore verified"

      - name: Encode to base64
        run: base64 -w 0 release.jks > keystore_base64.txt

      - name: Write setup instructions
        run: python3 write_instructions.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-FILES-KEEP-SAFE
          path: |
            release.jks
            keystore_base64.txt
            KEYSTORE_SETUP_INSTRUCTIONS.txt
          retention-days: 1

      - name: Build summary
        run: |
          echo "## Keystore Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | ${{ inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Key Alias | ${{ inputs.key_alias }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validity | ${{ inputs.validity_years }} years |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the **KEYSTORE-FILES-KEEP-SAFE** artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Open **KEYSTORE_SETUP_INSTRUCTIONS.txt** inside it" >> $GITHUB_STEP_SUMMARY
          echo "3. Add all 4 secrets to GitHub" >> $GITHUB_STEP_SUMMARY
          echo "4. Push to main for a fully signed APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Artifact expires in 24 hours — download NOW!**" >> $GITHUB_STEP_SUMMARY
